name: CloseClaw Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

jobs:
  check-proposal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Proposal & Attribution
        run: |
          # 检查是否有对应的提案文件在 votes/ 目录下
          # 对于 push 事件，检查 commit message 中是否包含 'Proposal: [ID]' 或关联提案文件
          echo "Starting CloseClaw Guard Audit..."
          
          # 检查变更中是否包含 votes/ 下的新文件或修改
          CHANGED_PROPOSALS=$(git diff --name-only HEAD~1 HEAD | grep "votes/proposal-" || true)
          
          if [ -z "$CHANGED_PROPOSALS" ]; then
            # 如果没有提案变更，检查 commit message
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if [[ ! "$COMMIT_MSG" =~ "proposal-" ]]; then
              echo "❌ ERROR: No proposal found in this change and no proposal ID mentioned in commit message."
              echo "According to RULES.md v1.9+, evry code change MUST be associated with a proposal."
              exit 1
            fi
          fi
          
          echo "✅ Audit passed: Alignment with CloseClaw protocol detected."
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Checking for proposal associated with PR #$PR_NUMBER: $PR_TITLE"
          
          # Search for proposal files containing the PR number or title keywords
          PROPOSAL_FOUND=$(grep -lE "PR.*#$PR_NUMBER|pulls/$PR_NUMBER" votes/*.md || true)
          
          if [ -z "$PROPOSAL_FOUND" ]; then
            echo "❌ ERROR: No matching proposal found in votes/ directory."
            echo "According to RULES.md v1.5, every code change must have a corresponding proposal document for voting."
            echo "Please create a proposal in votes/ following the template and include 'PR #$PR_NUMBER' in it."
            exit 1
          else
            echo "✅ SUCCESS: Proposal found: $PROPOSAL_FOUND"
          fi
