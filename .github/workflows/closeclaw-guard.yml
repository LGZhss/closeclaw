name: CloseClaw Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compliance Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "======================================"
          echo "CloseClaw Guard — 合规检查"
          echo "触发者: $ACTOR | 分支: $REF_NAME"
          echo "======================================"

          # 1. 检查是否仅包含文档/配置等非核心变更
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/main..HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD^..HEAD || true)
          fi
          
          NON_CODE_ONLY=true
          if [ -z "$CHANGED_FILES" ]; then
            NON_CODE_ONLY=false
          else
            for file in $CHANGED_FILES; do
              if [[ ! $file =~ ^(docs/|.*\.md$|\.gitignore$|\.env\.example$|votes/) ]]; then
                NON_CODE_ONLY=false
                break
              fi
            done
          fi

          if [ "$NON_CODE_ONLY" = "true" ]; then
            echo "✅ 仅包含文档、提案或非核心配置变更，跳过严格审计。"
            exit 0
          fi

          # 2. 提取提案 ID
          COMMIT_MSGS=$(git log origin/main..HEAD --pretty=%B 2>/dev/null || git log -1 --pretty=%B)
          SEARCH_TEXT="$PR_TITLE $PR_BODY $COMMIT_MSGS"
          PROPOSAL_ID=$(echo "$SEARCH_TEXT" | grep -oi 'proposal-[0-9]\+' | head -1 || true)

          if [ -z "$PROPOSAL_ID" ]; then
            if [ "$REF_NAME" = "main" ]; then
              echo "⚠️  main 分支直接推送且无提案 ID，审计通过。"
              exit 0
            fi
            echo "❌ 错误：未在提交信息或 PR 中找到提案 ID (例如 proposal-001)。"
            echo "根据 RULES.md，所有代码变更必须关联一个已通过的提案。"
            exit 1
          fi

          # 3. 验证提案状态
          PROPOSAL_PATH=$(find votes/ -name "${PROPOSAL_ID}*.md" | head -1)
          if [ -z "$PROPOSAL_PATH" ] || [ ! -f "$PROPOSAL_PATH" ]; then
            echo "❌ 错误：未找到提案文件：$PROPOSAL_ID"
            exit 1
          fi

          echo "📄 找到提案文件：$PROPOSAL_PATH"
          if ! grep -qiE "✅ 已通过|Approved|Passed" "$PROPOSAL_PATH"; then
            echo "❌ 错误：提案 $PROPOSAL_ID 尚未通过投票（状态需为 ✅ 已通过）。"
            exit 1
          fi

          echo "✅ 合规检查通过：$PROPOSAL_ID 已审核通过。"
