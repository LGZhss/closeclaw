name: CloseClaw Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    # issue_comment 触发时只处理 PR 评论
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PR 时检出 head 分支以便能推送回去
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────────────────────────
      # 用户特批处理：监听 PR 评论 "赞同 proposal-xxx"
      # ────────────────────────────────────────────────────────────────
      - name: Handle User Approval Comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PROXY_USER: LGZhss
        run: |
          echo "评论内容: $COMMENT_BODY"
          echo "评论用户: $COMMENT_USER"

          # 只接受 proxy_user 的特批评论
          if [ "$COMMENT_USER" != "$PROXY_USER" ]; then
            echo "非代理用户评论，跳过。"
            exit 0
          fi

          # 匹配格式：赞同 proposal-xxx 或 approve proposal-xxx（大小写不限）
          PROPOSAL_ID=$(echo "$COMMENT_BODY" | grep -oi 'proposal-[0-9]\+' | head -1 || true)

          if [ -z "$PROPOSAL_ID" ]; then
            echo "评论中无提案 ID，跳过。"
            exit 0
          fi

          PROPOSAL_PATH=$(find votes/ -name "${PROPOSAL_ID}*.md" | head -1)
          if [ -z "$PROPOSAL_PATH" ] || [ ! -f "$PROPOSAL_PATH" ]; then
            echo "❌ 未找到提案文件：$PROPOSAL_ID"
            exit 0
          fi

          # 已经是通过状态则跳过
          if grep -qiE "✅ 已通过|Approved|Passed" "$PROPOSAL_PATH"; then
            echo "提案已是通过状态，无需重复操作。"
            exit 0
          fi

          APPROVE_DATE=$(date -u +%Y-%m-%d)
          N=$(grep -c "协作主体" "$PROPOSAL_PATH" || echo "26")

          # 将投票中状态改为已通过，并写入用户投票记录
          sed -i "s/🟡 投票中/✅ 已通过（用户特批）/g" "$PROPOSAL_PATH"
          sed -i "s/⬜ 待投票/✅ 赞同/g" "$PROPOSAL_PATH"

          # 追加最终决议记录
          cat >> "$PROPOSAL_PATH" << EOF

---

## 📌 特批记录

- **特批日期**: ${APPROVE_DATE}
- **特批用户**: ${PROXY_USER}
- **关联 PR**: #${PR_NUMBER}
- **通过方式**: 用户评论特批（权重 +$(echo "$N * 0.5" | bc)，n=${N}）

> **最终决议**: ✅ 已通过（用户特批）
EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$PROPOSAL_PATH"
          git commit -m "vote(ci): mark ${PROPOSAL_ID} as approved via user comment on PR #${PR_NUMBER}"
          git push

          # 在 PR 上回复确认
          gh pr comment "$PR_NUMBER" --body "✅ **${PROPOSAL_ID} 已特批通过。**
Guard 将在下次 CI 运行时放行此 PR。
如需立即重新检查，请点击 Actions 中的 Re-run。"

          echo "✅ 特批完成：$PROPOSAL_ID"

      # ────────────────────────────────────────────────────────────────
      # 主合规检查（push 和 pull_request 事件）
      # ────────────────────────────────────────────────────────────────
      - name: Compliance Check
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        run: |
          echo "======================================"
          echo "CloseClaw Guard — 合规检查"
          echo "触发者: $ACTOR | 分支: $REF_NAME"
          echo "======================================"

          # ── 直接推送到 main ──────────────────────────────────────────
          if [ "$REF_NAME" = "main" ]; then
            COMMIT_MSG=$(git log -30 --pretty=%B)
            PROPOSAL_ID=$(echo "$COMMIT_MSG" | grep -oi 'proposal-[0-9]\+' | head -1 || true)

            if [ -z "$PROPOSAL_ID" ]; then
              echo "⚠️  main 分支直接 push，无提案 ID — 跳过严格审计（允许文档/注册类提交）"
              exit 0
            fi

            PROPOSAL_PATH=$(find votes/ -name "${PROPOSAL_ID}*.md" | head -1)
            if [ -z "$PROPOSAL_PATH" ] || [ ! -f "$PROPOSAL_PATH" ]; then
              echo "❌ 未找到提案文件：$PROPOSAL_ID"
              exit 1
            fi

            if grep -qiE "✅ 已通过|Approved|Passed" "$PROPOSAL_PATH"; then
              echo "✅ 合规通过：$PROPOSAL_ID 已通过"
              exit 0
            fi

            echo "❌ 提案 $PROPOSAL_ID 尚未通过投票"
            exit 1
          fi

          # ── Pull Request ──────────────────────────────────────────────
          # 在 PR commits + 标题 + 描述中搜索提案 ID
          COMMIT_MSGS=$(git log origin/main..HEAD --pretty=%B 2>/dev/null || true)
          SEARCH_TEXT="$PR_TITLE $PR_BODY $COMMIT_MSGS"
          PROPOSAL_ID=$(echo "$SEARCH_TEXT" | grep -oi 'proposal-[0-9]\+' | head -1 || true)

          # ── Jules Bot PR：无提案时自动生成 ────────────────────────────
          if [ -z "$PROPOSAL_ID" ] && echo "$ACTOR" | grep -qi "jules"; then
            echo "🤖 检测到 Jules Bot PR #${PR_NUMBER}，无关联提案，自动生成..."

            # 计算下一个提案编号
            LAST_NUM=$(ls votes/proposal-[0-9]*.md 2>/dev/null \
              | grep -oE 'proposal-[0-9]+' \
              | grep -oE '[0-9]+' \
              | sort -n | tail -1 || echo "0")
            NEW_NUM=$(printf "%03d" $((LAST_NUM + 1)))
            NEW_ID="proposal-${NEW_NUM}"

            # 提取 PR 级别提示（标题含 CRITICAL → 二级，否则一级）
            if echo "$PR_TITLE" | grep -qi "CRITICAL\|critical\|核心\|重大"; then
              LEVEL="二级"
              QUORUM="≥5 个协作主体 + 用户投票"
            else
              LEVEL="一级（简单类）"
              QUORUM="≥2 个协作主体"
            fi

            PROPOSAL_FILE="votes/${NEW_ID}-auto-jules-pr${PR_NUMBER}.md"
            TODAY=$(date -u +%Y-%m-%d)

            cat > "$PROPOSAL_FILE" << PROPOSAL_TEMPLATE
# 自动生成提案：${PR_TITLE}

> **提案 ID**: ${NEW_ID}
> **提案级别**: ${LEVEL}
> **发起者**: Jules Cloud Agent（自动生成）
> **关联 PR**: #${PR_NUMBER}
> **发起日期**: ${TODAY}
> **状态**: 🟡 投票中

---

## 📋 提案背景

本提案由 Jules Cloud Agent 在创建 PR #${PR_NUMBER} 时自动生成。

**PR 标题**: ${PR_TITLE}

**PR 描述**:
${PR_BODY}

---

## 🛠️ 修改说明

详见 PR #${PR_NUMBER} 的代码变更。

---

## ⚠️ 风险评估

待人工审核后填写。

---

## 🗳️ 协作主体投票

| 协作主体 | 态度 | 得分 | 备注 |
| :--- | :--- | :--- | :--- |
| Jules（自动） | ✅ 赞同 | +1 | 发起者 |

---

## 👤 用户投票

| 用户 | 态度 | 得分 | 备注 |
| :--- | :--- | :--- | :--- |
| LGZhss | ⬜ 待投票 | 0 | 在 PR #${PR_NUMBER} 评论 \`赞同 ${NEW_ID}\` 完成特批 |

---

> **最终决议**: 🟡 投票中
>
> 法定人数要求：${QUORUM}
> **特批方式**：在 PR #${PR_NUMBER} 中评论 \`赞同 ${NEW_ID}\` 即可完成用户特批。
PROPOSAL_TEMPLATE

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$PROPOSAL_FILE"
            git commit -m "auto(ci): generate ${NEW_ID} for Jules PR #${PR_NUMBER}

Proposal-By: Jules Cloud Agent
PR-Title: ${PR_TITLE}"
            git push origin HEAD:"$HEAD_REF"

            # 在 PR 上发布提示评论
            gh pr comment "$PR_NUMBER" --body "## 📋 CloseClaw Guard — 已自动生成提案

**提案文件**：\`${PROPOSAL_FILE}\`

Jules Bot 的 PR 需要关联提案并获得用户批准。

### ✅ 如何特批

在此 PR 评论以下内容即可完成用户特批：

\`\`\`
赞同 ${NEW_ID}
\`\`\`

特批后，Guard 将自动更新提案状态并放行此 PR。

---
*由 CloseClaw Guard 自动生成 · 遵循 [RULES.md](../blob/main/RULES.md)*"

            echo "📄 提案已生成：$PROPOSAL_FILE"
            echo "⏳ 等待用户在 PR #${PR_NUMBER} 评论 '赞同 ${NEW_ID}' 完成特批"
            exit 1
          fi

          # ── 常规检查：无提案 ID ────────────────────────────────────────
          if [ -z "$PROPOSAL_ID" ]; then
            echo "❌ 未找到提案 ID。请在 PR 标题、描述或 commit message 中包含 'proposal-xxx'"
            exit 1
          fi

          # ── 查找提案文件 ───────────────────────────────────────────────
          PROPOSAL_PATH=$(find votes/ -name "${PROPOSAL_ID}*.md" | head -1)
          if [ -z "$PROPOSAL_PATH" ] || [ ! -f "$PROPOSAL_PATH" ]; then
            echo "❌ 未找到提案文件：$PROPOSAL_ID（在 votes/ 目录中搜索无结果）"
            exit 1
          fi

          echo "📄 找到提案文件：$PROPOSAL_PATH"

          # ── 验证通过状态 ───────────────────────────────────────────────
          if ! grep -qiE "✅ 已通过|Approved|Passed" "$PROPOSAL_PATH"; then
            echo "❌ 提案 $PROPOSAL_ID 尚未通过投票"
            echo ""
            echo "如需特批，请在此 PR 评论："
            echo "  赞同 $PROPOSAL_ID"
            exit 1
          fi

          echo "✅ 合规检查通过：$PROPOSAL_ID 已通过审批"
