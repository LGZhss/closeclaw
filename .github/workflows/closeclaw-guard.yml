name: CloseClaw Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

jobs:
  check-proposal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

          if [ -z "$CHANGED_PROPOSALS" ]; then
            # 如果没有提案变更，检查 commit message 中的提案 ID
            COMMIT_MSG=$(git log -1 --pretty=%B)
            PROPOSAL_ID=$(echo "$COMMIT_MSG" | grep -o 'proposal-[0-9]\+' | head -1 || true)
            
            if [ -z "$PROPOSAL_ID" ]; then
              echo "❌ ERROR: No proposal ID found in commit message (e.g., proposal-009)."
              exit 1
            fi
            
            # 检查该提案文件是否存在
            PROPOSAL_FILE="votes/$PROPOSAL_ID.md"
            # 尝试模糊匹配文件名（处理 proposal-009-xxx.md 的情况）
            PROPOSAL_PATH=$(ls votes/$PROPOSAL_ID*.md | head -1 || true)
            
            if [ ! -f "$PROPOSAL_PATH" ]; then
              echo "❌ ERROR: Proposal file $PROPOSAL_ID not found in votes/ directory."
              exit 1
            fi
            
            # 关键：检查提案状态是否为“已通过”
            if ! grep -q "✅ 已通过" "$PROPOSAL_PATH"; then
              echo "❌ ERROR: Proposal $PROPOSAL_ID exists but its status is NOT '✅ 已通过'."
              echo "You cannot commit code for a proposal that is still in voting or rejected."
              exit 1
            fi
          fi
          
          echo "✅ Audit passed: Verified associated proposal is APPROVED."
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Checking for proposal associated with PR #$PR_NUMBER: $PR_TITLE"
          
          # Search for proposal files containing the PR number or title keywords
          PROPOSAL_FOUND=$(grep -lE "PR.*#$PR_NUMBER|pulls/$PR_NUMBER" votes/*.md || true)
          
          if [ -z "$PROPOSAL_FOUND" ]; then
            echo "❌ ERROR: No matching proposal found in votes/ directory."
            echo "According to RULES.md v1.5, every code change must have a corresponding proposal document for voting."
            echo "Please create a proposal in votes/ following the template and include 'PR #$PR_NUMBER' in it."
            exit 1
          else
            echo "✅ SUCCESS: Proposal found: $PROPOSAL_FOUND"
          fi
