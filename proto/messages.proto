// syntax = proto3, 向前兼容保留字段 100-199

syntax = "proto3";

package closeclaw.v1;

option go_package = "closeclaw/kernel/proto;clawpb";

// ─────────────────────────────────────────
// § 1  分布式追踪上下文
// ─────────────────────────────────────────

// TraceContext 由 Dart 控制层在接收用户消息时生成，
// 必须透传到所有下游 Go / TS 调用链，形成全链路追踪票据。
message TraceContext {
  string trace_id  = 1; // UUID v4，Dart 端生成
  string span_id   = 2; // 当前操作 span（可选）
  int64  created_at_ms = 3; // 毫秒时间戳，用于端到端延迟计算
}

// ─────────────────────────────────────────
// § 2  核心任务结构
// ─────────────────────────────────────────

// TaskStatus 对应 src/db.ts scheduled_tasks.is_paused 语义，并扩展了分布式状态
enum TaskStatus {
  PENDING  = 0;
  RUNNING  = 1;
  DONE     = 2;
  FAILED   = 3;
  TIMEOUT  = 4; // Dart 层心跳超时时标记，触发 L2 降级
  PAUSED   = 5; // 对应 is_paused = 1，沿用 TS 层的调度暂停概念
}

// Task 携带从 Dart 层下发至 Go 内核的全量业务信息。
message Task {
  string      task_id     = 1; 
  TraceContext trace       = 2; 
  string      group_jid   = 3; 
  string      group_folder = 4; 
  bytes       payload     = 5; // JSON 序列化的动态参数
  TaskStatus  status      = 6;
  string      schedule_type  = 7;  
  string      schedule_value = 8;  
  int64       created_at_ms  = 9;
  int64       next_run_at_ms = 10;
  
  // DAG 支持：依赖的任务 IDs (逗号分隔或 repeated)
  repeated string depends_on = 11;
}

// TaskResponse 由 Go 内核返回给 Dart 层，携带执行摘要。
message TaskResponse {
  string     task_id  = 1;
  TaskStatus status   = 8;
  string     error    = 9;
  map<string, string> metadata = 10;
  int64      elapsed_ms = 4;
}

// StatusUpdate 由 TS 沙盒完成工具调用后发送至 Go，回写结果。
message StatusUpdate {
  string     task_id  = 1;
  string     trace_id = 2;
  TaskStatus status   = 3;
  bytes      result   = 4; // 工具调用原始返回 JSON
  string     error    = 5;
  int64      completed_at_ms = 6;
}

// Ack 通用确认回执
message Ack {
  bool   ok      = 1;
  string message = 2;
}

// ─────────────────────────────────────────
// § 3  消息通道结构（对应 src/db.ts messages 表）
// ─────────────────────────────────────────

message IncomingMessage {
  int64  id           = 1;
  string channel      = 2; 
  string chat_jid     = 3;
  string sender_jid   = 4;
  string sender_name  = 5;
  string text         = 6;
  int64  timestamp    = 7;
  bool   is_group     = 8;
  string group_name   = 9;
  bool   processed    = 10;
}

// ─────────────────────────────────────────
// § 4  心跳 / 降级探活
// ─────────────────────────────────────────

message HeartbeatRequest {
  string trace_id = 1;
  int64  sent_at_ms = 2;
}

message HeartbeatResponse {
  bool   ok              = 1;
  int32  queue_length    = 2; 
  int32  active_goroutines = 3;
  string kernel_version  = 4; 
  int64  uptime_seconds  = 5;
}

// ─────────────────────────────────────────
// § 5  LLM 对话接口 (P027 Phase 3B)
// ─────────────────────────────────────────

message ChatRequest {
  TraceContext trace    = 1;
  string       message  = 2;
  repeated string history = 3; // 简化为字符串数组，后续可扩展
  map<string, string> options = 4; // 模型选择、温度等参数
}

message ChatResponse {
  string     text    = 1;
  TaskStatus status  = 2;
  string     error   = 3;
}

// ─────────────────────────────────────────
// § 6  gRPC Service 定义
// ─────────────────────────────────────────

service KernelBus {
  // 核心任务流
  rpc DispatchTask(Task) returns (TaskResponse);
  rpc SyncStatus(StatusUpdate) returns (Ack);
  rpc CheckHealth(HeartbeatRequest) returns (HeartbeatResponse);
  
  // 消息与订阅
  rpc GetPendingMessages(Ack) returns (stream IncomingMessage);
  rpc SubscribeTasks(Ack) returns (stream Task);

  // LLM 推理转发 (Phase 3B)
  rpc Chat(ChatRequest) returns (ChatResponse);
}
